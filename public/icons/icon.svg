<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#14213d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ledger book icon -->
  <g transform="translate(256,256)">
    <!-- Book cover -->
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="white" opacity="0.95"/>
    <!-- Spine -->
    <rect x="-80" y="-60" width="16" height="120" rx="4" fill="#E2E8F0"/>
    <!-- Lines (ledger entries) -->
    <line x1="-52" y1="-30" x2="68" y2="-30" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="-52" y1="-6" x2="68" y2="-6" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="-52" y1="18" x2="68" y2="18" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
    <!-- Checkmark -->
    <circle cx="60" cy="-48" r="16" fill="#10B981"/>
    <path d="M54,-48 L58,-44 L66,-52" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
